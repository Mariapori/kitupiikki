name: Flatpak Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub repository
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install KDE SDK and Runtime
        run: |
          flatpak install --user -y flathub org.kde.Platform//6.8 org.kde.Sdk//6.8

      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean --repo=repo build-dir fi.kitsas.Kitsas.yml

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle repo Kitsas.flatpak fi.kitsas.Kitsas

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: Kitsas-flatpak
          path: Kitsas.flatpak
          retention-days: 30
