app-id: fi.kitsas.Kitsas
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: kitsas

finish-args:
  # Windowing
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # GPU acceleration (QtWebEngine)
  - --device=dri
  # Network access (Kitsas cloud service)
  - --share=network
  # File access for bookkeeping databases
  - --filesystem=home

modules:
  # libzip – required by Kitsas on Linux
  - name: libzip
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TOOLS=OFF
      - -DBUILD_REGRESS=OFF
      - -DBUILD_DOC=OFF
      - -DBUILD_EXAMPLES=OFF
    sources:
      - type: archive
        url: https://libzip.org/download/libzip-1.11.2.tar.xz
        sha256: 5ee2dce9e788e37b67dae7b0cc9e6fdb3a1edd454432135a8dbf3413fb07d50f

  # Kitsas application
  - name: kitsas
    buildsystem: qmake
    build-options:
      env:
        QMAKEPATH: /usr/lib/sdk
    config-opts:
      - kitsas/kitsas.pro
      - CONFIG+=release
    sources:
      - type: dir
        path: .
        skip:
          - .git
          - .flatpak-builder
          - build-*
    post-install:
      - install -Dm755 kitsas ${FLATPAK_DEST}/bin/kitsas
      - install -Dm644 ../kitsas.desktop ${FLATPAK_DEST}/share/applications/fi.kitsas.Kitsas.desktop
      - install -Dm644 ../kitsas.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/fi.kitsas.Kitsas.svg
      - install -Dm644 ../kitsas.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/fi.kitsas.Kitsas.png
      - install -Dm644 ../fi.kitsas.Kitsas.metainfo.xml ${FLATPAK_DEST}/share/metainfo/fi.kitsas.Kitsas.metainfo.xml
